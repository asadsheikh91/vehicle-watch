name: VehicleWatch CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: vehiclewatch_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run migrations
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:testpassword@localhost:5432/vehiclewatch_test
          REDIS_URL: redis://localhost:6379
          SECRET_KEY: test-secret-key-for-ci-minimum-32-chars
          GEMINI_API_KEY: test-key
          ENVIRONMENT: test
        run: alembic upgrade head

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:testpassword@localhost:5432/vehiclewatch_test
          REDIS_URL: redis://localhost:6379
          SECRET_KEY: test-secret-key-for-ci-minimum-32-chars
          GEMINI_API_KEY: test-key
          ENVIRONMENT: test
        run: |
          pip install pytest-cov
          pytest tests/ -v --cov=app --cov-report=term-missing --cov-fail-under=70
